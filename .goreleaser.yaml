version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .Binary }}-{{ .Os }}-{{ .Arch }}"
    wrap_in_directory: false

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: mandeep
      name: homebrew-muxforge
    homepage: https://github.com/mandeep/muxforge
    description: A plugin manager and multiplexer forge for developer toolchains
    install: |
      bin.install "muxforge"
    test: |
      assert_match /muxforge v/, shell_output("#{bin}/muxforge --version")
